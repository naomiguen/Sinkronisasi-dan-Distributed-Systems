
# Network

bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300


# General

daemonize no
loglevel notice
logfile ""
databases 1


# Persistence - RDB Snapshot
# Simpan snapshot ke disk secara berkala sebagai backup
# Format: save <detik> <jumlah_perubahan>

save 3600 1
save 300 10
save 60 1000

rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data


# Persistence - AOF (Append Only File)
# AOF mencatat setiap write command untuk durabilitas penuh.
# Jika Redis crash, data bisa dipulihkan dari AOF.
# appendfsync everysec = flush ke disk setiap 1 detik (trade-off bagus)

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes


# Memory Management

maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5


# Pub/Sub - dipakai untuk cache invalidation broadcast
# K = keyspace events
# E = keyevent events
# x = expired key events
# g = generic events (DEL, EXPIRE, RENAME)

notify-keyspace-events KExg


# Performance

hz 10
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes


# Slow Log - catat query yang lambat untuk debugging
# Log query yang lebih lama dari 10ms

slowlog-log-slower-than 10000
slowlog-max-len 128


# Security (aktifkan di production)

# requirepass your_password_here


# Limits

maxclients 100